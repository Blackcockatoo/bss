name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --run

      - name: Assert child-safe deployment config
        env:
          STUDENT_DEPLOYMENT: ${{ vars.STUDENT_DEPLOYMENT }}
          NEXT_PUBLIC_CHILD_SAFE_BASELINE: ${{ vars.NEXT_PUBLIC_CHILD_SAFE_BASELINE }}
          NEXT_PUBLIC_APP_PROFILE: ${{ vars.NEXT_PUBLIC_APP_PROFILE }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
        run: npm run check:child-safe-deployment

      - name: Build
        run: npm run build
